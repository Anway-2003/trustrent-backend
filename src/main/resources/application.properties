spring.application.name=trustrent api

# ☁️ Cloud Database Connection (Render will provide these values securely)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# 🛠️ Hibernate Settings (He aapoap tables banvel / update karel)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# 📸 Image Upload Data Limit (Tumche settings thevle aahet)
server.tomcat.max-http-form-post-size=20MB
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB